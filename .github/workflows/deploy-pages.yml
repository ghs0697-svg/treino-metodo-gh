# Deploy do app.metodogh.com.br via GitHub Actions (build_type=workflow).
# Migrado do build "legacy" em 2026-07-02: o pipeline legado passou a falhar em série
# ("Page build failed", dur=0, sem log) segurando releases no ar. Este caminho é o
# recomendado pelo GitHub, publica o site estático como artifact e tem log visível.
name: Deploy Pages
on:
  push:
    branches: [master]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
